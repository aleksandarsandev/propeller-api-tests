name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout test project
        uses: actions/checkout@v4
        with:
          path: tests

      - name: Checkout API project
        uses: actions/checkout@v4
        with:
          repository: propeller-commerce/propeller-sdet-task-Aleksandar-Sandev
          path: api

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: tests/package-lock.json

      - name: Start API with Docker
        working-directory: api
        run: |
          docker-compose up --build -d
          echo "Waiting for API to be ready..."
          sleep 15

      - name: Seed database
        working-directory: api
        run: docker-compose run --rm seed

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Run tests
        working-directory: tests
        run: npm test

      - name: Stop API
        if: always()
        working-directory: api
        run: docker-compose down -v